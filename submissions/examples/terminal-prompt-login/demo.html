<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">

  <title>Terminal Prompt Login</title>
</head>
<body>

  <form class="lf-term">
    <div class="lf-term-bar">
      <span class="lf-term-dot r"></span>
      <span class="lf-term-dot y"></span>
      <span class="lf-term-dot g"></span>
      <span class="lf-term-title">~/login</span>
    </div>

    <div class="lf-term-body">
      <div class="lf-term-line">
        <span class="lf-term-prompt">$</span>
        auth login
      </div>

      <div class="lf-term-line">
        <span class="lf-term-prompt">user:</span>
        <input type="email" placeholder="you@example.com" required>
      </div>

      <div class="lf-term-line">
        <span class="lf-term-prompt">pass:</span>
        <input type="password" placeholder="••••••••" required>
      </div>

      <button type="submit" class="lf-term-btn">
        $ run
        <span class="lf-term-caret">_</span>
      </button>
    </div>
  </form>

</body>
</html>
