<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Tag Cloud | EaseMotion CSS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="tagcloud">
    <div class="tagcloud__header">
      <h1 class="tagcloud__title">Skills &amp; Technologies</h1>
      <p class="tagcloud__subtitle">Hover over any tag to see the glow effect</p>
    </div>

    <div class="tagcloud__cloud">
      <span class="tagcloud__tag tagcloud__tag--xl tagcloud__tag--indigo">JavaScript</span>
      <span class="tagcloud__tag tagcloud__tag--lg tagcloud__tag--blue">TypeScript</span>
      <span class="tagcloud__tag tagcloud__tag--sm tagcloud__tag--pink">React</span>
      <span class="tagcloud__tag tagcloud__tag--md tagcloud__tag--green">Node.js</span>
      <span class="tagcloud__tag tagcloud__tag--lg tagcloud__tag--purple">Python</span>
      <span class="tagcloud__tag tagcloud__tag--sm tagcloud__tag--orange">Go</span>
      <span class="tagcloud__tag tagcloud__tag--md tagcloud__tag--teal">Rust</span>
      <span class="tagcloud__tag tagcloud__tag--xl tagcloud__tag--red">CSS</span>
      <span class="tagcloud__tag tagcloud__tag--md tagcloud__tag--cyan">HTML</span>
      <span class="tagcloud__tag tagcloud__tag--sm tagcloud__tag--amber">Docker</span>
      <span class="tagcloud__tag tagcloud__tag--lg tagcloud__tag--indigo">GraphQL</span>
      <span class="tagcloud__tag tagcloud__tag--md tagcloud__tag--blue">AWS</span>
      <span class="tagcloud__tag tagcloud__tag--sm tagcloud__tag--pink">Figma</span>
      <span class="tagcloud__tag tagcloud__tag--xl tagcloud__tag--green">PostgreSQL</span>
      <span class="tagcloud__tag tagcloud__tag--md tagcloud__tag--purple">MongoDB</span>
      <span class="tagcloud__tag tagcloud__tag--lg tagcloud__tag--orange">Tailwind</span>
      <span class="tagcloud__tag tagcloud__tag--sm tagcloud__tag--teal">Git</span>
      <span class="tagcloud__tag tagcloud__tag--md tagcloud__tag--red">Linux</span>
      <span class="tagcloud__tag tagcloud__tag--sm tagcloud__tag--cyan">Redis</span>
      <span class="tagcloud__tag tagcloud__tag--lg tagcloud__tag--amber">Next.js</span>
      <span class="tagcloud__tag tagcloud__tag--md tagcloud__tag--indigo">Vue</span>
      <span class="tagcloud__tag tagcloud__tag--xl tagcloud__tag--blue">Sass</span>
      <span class="tagcloud__tag tagcloud__tag--sm tagcloud__tag--green">Jest</span>
      <span class="tagcloud__tag tagcloud__tag--md tagcloud__tag--pink">Cypress</span>
    </div>
  </div>

</body>
</html>
