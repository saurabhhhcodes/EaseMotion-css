<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Status Pill</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="pill-list">
    <div class="pill pill--success">
      <span class="pill__icon"></span>
      <span class="pill__label">Success</span>
    </div>
    <div class="pill pill--warning">
      <span class="pill__icon"></span>
      <span class="pill__label">Warning</span>
    </div>
    <div class="pill pill--error">
      <span class="pill__icon"></span>
      <span class="pill__label">Error</span>
    </div>
    <div class="pill pill--info">
      <span class="pill__icon"></span>
      <span class="pill__label">Info</span>
    </div>
    <div class="pill pill--neutral">
      <span class="pill__icon"></span>
      <span class="pill__label">Neutral</span>
    </div>
  </div>
</body>
</html>
