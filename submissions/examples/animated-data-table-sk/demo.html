<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Data Table</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="table-wrapper">
    <table class="data-table">
      <thead>
        <tr>
          <th>Name</th>
          <th>Status</th>
          <th>Role</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>Emma Chen</td>
          <td><span class="badge badge--active">Active</span></td>
          <td>Designer</td>
          <td><button class="action-btn">Edit</button></td>
        </tr>
        <tr>
          <td>Liam Torres</td>
          <td><span class="badge badge--pending">Pending</span></td>
          <td>Developer</td>
          <td><button class="action-btn">Edit</button></td>
        </tr>
        <tr>
          <td>Sophia Hart</td>
          <td><span class="badge badge--inactive">Inactive</span></td>
          <td>Manager</td>
          <td><button class="action-btn">Edit</button></td>
        </tr>
        <tr>
          <td>Noah Rivera</td>
          <td><span class="badge badge--archived">Archived</span></td>
          <td>Analyst</td>
          <td><button class="action-btn">Edit</button></td>
        </tr>
      </tbody>
    </table>
  </div>
</body>
</html>
