<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Animated Split Button | EaseMotion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1 class="split-btn__heading">Split Button Variants</h1>
  <div class="split-btn__showcase">

    <div class="split-btn">
      <button class="split-btn__action">Save</button>
      <button class="split-btn__arrow" aria-label="More options">▾</button>
    </div>

    <div class="split-btn">
      <button class="split-btn__action">Delete</button>
      <button class="split-btn__arrow" aria-label="More options">▾</button>
    </div>

    <div class="split-btn">
      <button class="split-btn__action">Edit</button>
      <button class="split-btn__arrow" aria-label="More options">▾</button>
    </div>

    <div class="split-btn">
      <button class="split-btn__action">Share</button>
      <button class="split-btn__arrow" aria-label="More options">▾</button>
    </div>

  </div>

  <p class="split-btn__footnote">Hover &amp; click each split button half independently.</p>
</body>
</html>
