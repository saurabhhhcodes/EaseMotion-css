<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Color Picker | EaseMotion CSS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <section class="demo-section">
    <h1 class="demo-title">Animated Color Picker</h1>
    <p class="demo-subtitle">CSS-only color swatch picker with selection animation and preview.</p>

    <div class="demo-card">
      <div class="picker-preview" id="preview" style="--preview-color: #6366f1;">
        <span class="picker-preview__label">Selected Color</span>
        <span class="picker-preview__value">#6366f1</span>
      </div>
    </div>

    <div class="demo-card">
      <h2 class="demo-label">Preset Colors</h2>
      <div class="picker-grid">
        <label class="swatch">
          <input type="radio" name="color" value="#ef4444" class="swatch__input" checked>
          <span class="swatch__visual" style="--swatch-color: #ef4444;"></span>
        </label>
        <label class="swatch">
          <input type="radio" name="color" value="#f97316" class="swatch__input">
          <span class="swatch__visual" style="--swatch-color: #f97316;"></span>
        </label>
        <label class="swatch">
          <input type="radio" name="color" value="#f59e0b" class="swatch__input">
          <span class="swatch__visual" style="--swatch-color: #f59e0b;"></span>
        </label>
        <label class="swatch">
          <input type="radio" name="color" value="#22c55e" class="swatch__input">
          <span class="swatch__visual" style="--swatch-color: #22c55e;"></span>
        </label>
        <label class="swatch">
          <input type="radio" name="color" value="#10b981" class="swatch__input">
          <span class="swatch__visual" style="--swatch-color: #10b981;"></span>
        </label>
        <label class="swatch">
          <input type="radio" name="color" value="#14b8a6" class="swatch__input">
          <span class="swatch__visual" style="--swatch-color: #14b8a6;"></span>
        </label>
        <label class="swatch">
          <input type="radio" name="color" value="#06b6d4" class="swatch__input">
          <span class="swatch__visual" style="--swatch-color: #06b6d4;"></span>
        </label>
        <label class="swatch">
          <input type="radio" name="color" value="#3b82f6" class="swatch__input">
          <span class="swatch__visual" style="--swatch-color: #3b82f6;"></span>
        </label>
        <label class="swatch">
          <input type="radio" name="color" value="#6366f1" class="swatch__input">
          <span class="swatch__visual" style="--swatch-color: #6366f1;"></span>
        </label>
        <label class="swatch">
          <input type="radio" name="color" value="#8b5cf6" class="swatch__input">
          <span class="swatch__visual" style="--swatch-color: #8b5cf6;"></span>
        </label>
        <label class="swatch">
          <input type="radio" name="color" value="#a855f7" class="swatch__input">
          <span class="swatch__visual" style="--swatch-color: #a855f7;"></span>
        </label>
        <label class="swatch">
          <input type="radio" name="color" value="#d946ef" class="swatch__input">
          <span class="swatch__visual" style="--swatch-color: #d946ef;"></span>
        </label>
      </div>
    </div>
  </section>
</body>
</html>
